name: C/C++ CI Drishya

on:
push:
branches: ["master"]
pull_request:
branches: ["master"]

jobs:
build:
runs-on: ubuntu-latest

steps:
  - name: Checkout Repository
    uses: actions/checkout@v4

  - name: Install GCC
    run: sudo apt-get update && sudo apt-get install -y build-essential

  - name: Compile C Program
    run: gcc Logic.c -o Logic

  - name: Run Program
    run: ./Logic

